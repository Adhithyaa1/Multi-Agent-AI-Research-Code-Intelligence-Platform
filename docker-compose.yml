services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CORS_ALLOW_ORIGINS: "http://localhost:3000"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.1"
    volumes:
      - backend-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  backend-data:
